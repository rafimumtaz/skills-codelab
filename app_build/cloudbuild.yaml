steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'app_build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aerobudget:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aerobudget:latest'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/aerobudget:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/aerobudget:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aerobudget'
      - '--image=gcr.io/$PROJECT_ID/aerobudget:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/aerobudget:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/aerobudget:latest'

options:
  logging: CLOUD_LOGGING_ONLY
